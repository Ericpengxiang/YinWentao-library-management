<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{block name="title"}智慧图书馆 - 读者中心{/block}</title>
<link rel="stylesheet" href="https://unpkg.com/layui@2.9.6/dist/css/layui.css">
<style>
:root{--primary:#2563eb;--primary-light:#3b82f6;--primary-dark:#1d4ed8;--primary-bg:#eff6ff;--text-main:#1e293b;--text-sub:#64748b;--text-light:#94a3b8;--border:#e2e8f0;--bg:#f8fafc;--card-bg:#ffffff;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text-main)}
.topnav{background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.topnav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav-title{font-size:16px;font-weight:700;color:var(--text-main)}
.nav-sub{font-size:11px;color:var(--text-sub)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{padding:7px 14px;border-radius:8px;font-size:14px;color:var(--text-sub);text-decoration:none;transition:all .15s}
.nav-link:hover{background:var(--primary-bg);color:var(--primary)}
.nav-link.active{background:var(--primary-bg);color:var(--primary);font-weight:600}
.nav-user{display:flex;align-items:center;gap:8px}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.nav-name{font-size:14px;color:var(--text-sub)}
.nav-logout{font-size:13px;color:var(--text-light);text-decoration:none;padding:5px 10px;border-radius:6px;border:1px solid var(--border);transition:all .15s}
.nav-logout:hover{color:var(--danger);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.05)}
.page-wrap{max-width:1200px;margin:0 auto;padding:28px 24px}
.card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:700;color:var(--text-main);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-light))}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,#10b981,#34d399)}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,#ef4444,#f87171)}
.stat-label{font-size:12px;color:var(--text-sub);margin-bottom:6px}
.stat-num{font-size:28px;font-weight:800;color:var(--text-main);line-height:1}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#d1fae5;color:#065f46}
.badge-orange{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gray{background:#f1f5f9;color:#475569}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);color:#fff}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669;color:#fff}
.btn-ghost{background:#fff;color:var(--text-sub);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--text-main)}
.btn-sm{padding:4px 10px;font-size:12px}
.layui-table th{background:#f8fafc!important;color:var(--text-sub)!important;font-size:12px!important;font-weight:600!important;border-color:var(--border)!important}
.layui-table td{border-color:var(--border)!important;color:var(--text-main)!important;font-size:13px!important}
.layui-table tr:hover td{background:#f8fafc!important}
.layui-layer{border-radius:12px!important;border:1px solid var(--border)!important;box-shadow:0 20px 60px rgba(0,0,0,.15)!important}
.layui-layer-title{background:#f8fafc!important;color:var(--text-main)!important;font-weight:700!important;border-bottom:1px solid var(--border)!important;border-radius:12px 12px 0 0!important}
.layui-btn{border-radius:8px!important}
.layui-btn-normal{background:var(--primary)!important;border-color:var(--primary)!important}
.muted{color:var(--text-light);font-size:13px}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.book-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:all .2s;cursor:pointer}
.book-card:hover{box-shadow:0 8px 24px rgba(37,99,235,.12);transform:translateY(-2px);border-color:#bfdbfe}
.book-cover{height:140px;background:linear-gradient(135deg,#eff6ff,#dbeafe);display:flex;align-items:center;justify-content:center;font-size:40px}
.book-info{padding:12px}
.book-title{font-size:13px;font-weight:600;color:var(--text-main);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-author{font-size:12px;color:var(--text-sub);margin-bottom:8px}
.book-stock{font-size:11px}
.notice-item{padding:12px 0;border-bottom:1px solid var(--border)}
.notice-item:last-child{border-bottom:none}
.notice-title{font-size:14px;font-weight:600;color:var(--text-main);margin-bottom:4px}
.notice-time{font-size:12px;color:var(--text-light)}
</style>
{block name="head"}{/block}
</head>
<body>
<nav class="topnav">
<div class="topnav-inner">
<a class="nav-brand" href="/reader/index/index">
<div class="nav-logo">📚</div>
<div><div class="nav-title">智慧图书馆</div><div class="nav-sub">读者中心</div></div>
</a>
<div class="nav-links">
<a class="nav-link {:request()->controller() === 'Index' ? 'active' : ''}" href="/reader/index/index">我的主页</a>
<a class="nav-link {:request()->controller() === 'Book' ? 'active' : ''}" href="/reader/book/index">图书搜索</a>
<a class="nav-link {:request()->controller() === 'Borrow' ? 'active' : ''}" href="/reader/borrow/index">我的借阅</a>
</div>
<div class="nav-user">
<div class="nav-avatar">{:mb_substr((string)(session('reader_name') ?: '读'), 0, 1, 'UTF-8')}</div>
<span class="nav-name">{:session('reader_name') ?: '读者'}</span>
<a class="nav-logout" href="/reader/login/logout">退出</a>
</div>
</div>
</nav>
<div class="page-wrap">
{block name="content"}{/block}
</div>
<script src="https://unpkg.com/layui@2.9.6/dist/layui.js"></script>
{block name="script"}{/block}
</body>
</html>
