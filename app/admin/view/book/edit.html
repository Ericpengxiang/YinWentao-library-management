{extend name="layout/base" /}
{block name="title"}编辑图书 - 智慧图书管理系统{/block}
{block name="content"}
<div class="card">
    <div class="card-title">编辑图书</div>
    <form class="layui-form" style="max-width:720px;" lay-filter="form-book">
        <input type="hidden" name="id" value="{$book.id|htmlspecialchars}">
        <div class="layui-form-item">
            <label class="layui-form-label">ISBN</label>
            <div class="layui-input-block">
                <input type="text" name="isbn" required lay-verify="required" class="layui-input" value="{$book.isbn|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">书名</label>
            <div class="layui-input-block">
                <input type="text" name="title" required lay-verify="required" class="layui-input" value="{$book.title|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">作者</label>
            <div class="layui-input-block">
                <input type="text" name="author" required lay-verify="required" class="layui-input" value="{$book.author|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">出版社</label>
            <div class="layui-input-block">
                <input type="text" name="publisher" required lay-verify="required" class="layui-input" value="{$book.publisher|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分类</label>
            <div class="layui-input-block">
                <select name="category_id" lay-verify="required">
                    {volist name="categories" id="c"}
                    <option value="{$c.id}" {if $book.category_id == $c.id}selected{/if}>{$c.name|htmlspecialchars}</option>
                    {/volist}
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">库存</label>
            <div class="layui-input-inline" style="width:120px;">
                <input type="number" name="total" required lay-verify="required|number" class="layui-input" value="{$book.total|htmlspecialchars}" min="0">
            </div>
            <div class="layui-form-mid">可借</div>
            <div class="layui-input-inline" style="width:120px;">
                <input type="number" name="available" required lay-verify="required|number" class="layui-input" value="{$book.available|htmlspecialchars}" min="0">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">定价</label>
            <div class="layui-input-inline" style="width:160px;">
                <input type="text" name="price" required lay-verify="required" class="layui-input" value="{$book.price|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">出版日期</label>
            <div class="layui-input-inline" style="width:200px;">
                <input type="text" name="publish_date" id="publish_date" class="layui-input" value="{$book.publish_date|htmlspecialchars}">
            </div>
        </div>
        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">简介</label>
            <div class="layui-input-block">
                <textarea name="description" class="layui-textarea">{$book.description|htmlspecialchars}</textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="上架" {if $book.status == 1}checked{/if}>
                <input type="radio" name="status" value="0" title="下架" {if $book.status == 0}checked{/if}>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn btn-primary" lay-submit lay-filter="save">保存</button>
                <a href="/admin/book/index" class="layui-btn btn-ghost">返回</a>
            </div>
        </div>
    </form>
</div>
{/block}
{block name="script"}
<script>
layui.use(['form','laydate','layer'], function(){
    var form = layui.form, laydate = layui.laydate, layer = layui.layer, $ = layui.$;
    form.render();
    laydate.render({ elem: '#publish_date', type: 'date' });
    form.on('submit(save)', function(data){
        var load = layer.load(2);
        $.post('/admin/book/saveEdit', data.field, function(res){
            layer.close(load);
            if(res.code === 0){
                layer.msg('保存成功', {icon:1}, function(){ location.href='/admin/book/index'; });
            } else {
                layer.msg(res.msg, {icon:2});
            }
        }, 'json');
        return false;
    });
});
</script>
{/block}
