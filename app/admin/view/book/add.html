{extend name="layout/base" /}
{block name="title"}添加图书 - 智慧图书管理系统{/block}
{block name="content"}
<div class="card">
    <div class="card-title">添加图书</div>
    <form class="layui-form" style="max-width:720px;" lay-filter="form-book">
        <div class="layui-form-item">
            <label class="layui-form-label">ISBN</label>
            <div class="layui-input-block">
                <input type="text" name="isbn" required lay-verify="required" class="layui-input" placeholder="ISBN">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">书名</label>
            <div class="layui-input-block">
                <input type="text" name="title" required lay-verify="required" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">作者</label>
            <div class="layui-input-block">
                <input type="text" name="author" required lay-verify="required" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">出版社</label>
            <div class="layui-input-block">
                <input type="text" name="publisher" required lay-verify="required" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分类</label>
            <div class="layui-input-block">
                <select name="category_id" lay-verify="required">
                    <option value="">请选择</option>
                    {volist name="categories" id="c"}
                    <option value="{$c.id}">{$c.name|htmlspecialchars}</option>
                    {/volist}
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">库存</label>
            <div class="layui-input-inline" style="width:120px;">
                <input type="number" name="total" required lay-verify="required|number" class="layui-input" value="0" min="0">
            </div>
            <div class="layui-form-mid">可借（默认同总库存）</div>
            <div class="layui-input-inline" style="width:120px;">
                <input type="number" name="available" class="layui-input" value="" placeholder="可选">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">定价</label>
            <div class="layui-input-inline" style="width:160px;">
                <input type="text" name="price" required lay-verify="required" class="layui-input" placeholder="0.00">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">出版日期</label>
            <div class="layui-input-inline" style="width:200px;">
                <input type="text" name="publish_date" id="publish_date" class="layui-input" placeholder="yyyy-MM-dd">
            </div>
        </div>
        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label">简介</label>
            <div class="layui-input-block">
                <textarea name="description" class="layui-textarea" placeholder="内容简介"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-block">
                <input type="radio" name="status" value="1" title="上架" checked>
                <input type="radio" name="status" value="0" title="下架">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <button class="layui-btn btn-primary" lay-submit lay-filter="save">保存</button>
                <a href="/admin/book/index" class="layui-btn btn-ghost">返回</a>
            </div>
        </div>
    </form>
</div>
{/block}
{block name="script"}
<script>
layui.use(['form','laydate','layer'], function(){
    var form = layui.form, laydate = layui.laydate, layer = layui.layer, $ = layui.$;
    form.render();
    laydate.render({ elem: '#publish_date', type: 'date' });
    form.on('submit(save)', function(data){
        var load = layer.load(2);
        $.post('/admin/book/saveAdd', data.field, function(res){
            layer.close(load);
            if(res.code === 0){
                layer.msg('添加成功', {icon:1}, function(){ location.href='/admin/book/index'; });
            } else {
                layer.msg(res.msg, {icon:2});
            }
        }, 'json');
        return false;
    });
});
</script>
{/block}
