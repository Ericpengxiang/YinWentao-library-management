<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧图书管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/layui@2.9.6/dist/css/layui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@700&display=swap">
    <style>
        :root {
            --primary: #ff7a1a;
            --bg: #1a1208;
            --panel: #221a0c;
            --border: rgba(255, 150, 50, 0.12);
        }
        html, body { margin: 0; min-height: 100%; background: var(--bg); font-family: 'Noto Sans SC', sans-serif; }
        .login-wrap { display: flex; min-height: 100vh; }
        .login-left {
            flex: 1.1;
            padding: 48px 56px;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 122, 26, 0.25), transparent 55%),
                        radial-gradient(ellipse at 70% 80%, rgba(255, 179, 71, 0.12), transparent 50%),
                        linear-gradient(135deg, #2a1a0a, #1a1208);
            color: #f5efe6;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-left h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            margin: 0 0 16px;
            color: #fff4e8;
        }
        .login-left p { line-height: 1.8; color: #c4b8a8; max-width: 520px; font-size: 15px; }
        .feat { margin-top: 36px; display: grid; gap: 14px; }
        .feat-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(255, 122, 26, 0.08);
            border: 1px solid var(--border);
        }
        .feat-item strong { color: #ffd4a8; display: block; margin-bottom: 4px; }
        .login-right {
            flex: 0.9;
            min-width: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            background: #1a1208;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 32px 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }
        .login-card h2 { margin: 0 0 8px; color: #ffe8d2; font-size: 22px; }
        .login-card .sub { color: #a89880; font-size: 13px; margin-bottom: 28px; }
        .layui-form-label { color: #e0d4c4 !important; width: 72px !important; }
        .layui-input-block { margin-left: 102px !important; }
        .layui-input {
            background: rgba(0, 0, 0, 0.25) !important;
            border-color: rgba(255, 150, 50, 0.2) !important;
            color: #f5efe6 !important;
            border-radius: 10px !important;
        }
        .layui-input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(255, 122, 26, 0.25) !important;
        }
        .btn-login {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            background: linear-gradient(90deg, #ffb347, #ff7a1a);
            color: #1a1208;
        }
        @media (max-width: 960px) {
            .login-wrap { flex-direction: column; }
            .login-left { flex: none; padding: 36px 28px; }
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-left">
        <h1>智慧图书管理系统</h1>
        <p>面向专科学校的图书采编、读者服务与借阅业务，支持库存与超期管理、可视化统计与一键还书，助力课程设计与实训落地。</p>
        <div class="feat">
            <div class="feat-item">
                <span style="font-size:22px;">⚡</span>
                <div><strong>借阅全流程</strong><span>借书校验、事务保证、还书即时更新库存与读者借阅数。</span></div>
            </div>
            <div class="feat-item">
                <span style="font-size:22px;">📈</span>
                <div><strong>数据可视化</strong><span>分类占比饼图、近 7 日借阅趋势折线，首页一屏掌握运行态势。</span></div>
            </div>
            <div class="feat-item">
                <span style="font-size:22px;">🎨</span>
                <div><strong>橙色深色风</strong><span>Layui + ECharts，统一后台体验，适配 XAMPP / phpstudy 本地部署。</span></div>
            </div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-card">
            <h2>管理员登录</h2>
            <div class="sub">默认账号 admin / 123456（首次登录后请及时修改密码）</div>
            <form class="layui-form" lay-filter="login-form">
                <div class="layui-form-item">
                    <label class="layui-form-label">账号</label>
                    <div class="layui-input-block">
                        <input type="text" name="username" required lay-verify="required" placeholder="用户名" autocomplete="username" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">密码</label>
                    <div class="layui-input-block">
                        <input type="password" name="password" required lay-verify="required" placeholder="密码" autocomplete="current-password" class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item" style="margin-top:28px;">
                    <button type="button" class="btn-login" lay-submit lay-filter="login-submit">登 录</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://unpkg.com/layui@2.9.6/dist/layui.js"></script>
<script>
layui.use(['form', 'layer'], function(){
    var form = layui.form, layer = layui.layer, $ = layui.$;
    form.on('submit(login-submit)', function(data){
        var load = layer.load(2, {shade: 0.2});
        $.post('/admin/login/doLogin', data.field, function(res){
            layer.close(load);
            if (res.code === 0) {
                layer.msg('登录成功', {icon: 1, time: 800}, function(){
                    window.location.href = res.data.url || '/admin/index/index';
                });
            } else {
                layer.msg(res.msg || '登录失败', {icon: 2});
            }
        }, 'json').fail(function(){
            layer.close(load);
            layer.msg('网络错误', {icon: 2});
        });
        return false;
    });
});
</script>
</body>
</html>
