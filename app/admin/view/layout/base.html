<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{block name="title"}智慧图书管理系统{/block}</title>
<link rel="stylesheet" href="https://unpkg.com/layui@2.9.6/dist/css/layui.css">
<style>
:root{--primary:#2563eb;--primary-light:#3b82f6;--primary-dark:#1d4ed8;--primary-bg:#eff6ff;--sidebar-bg:#1e293b;--sidebar-hover:#334155;--text-main:#1e293b;--text-sub:#64748b;--text-light:#94a3b8;--border:#e2e8f0;--bg:#f8fafc;--card-bg:#ffffff;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 6px -1px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text-main)}
.app-wrap{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow-y:auto}
.brand{display:flex;align-items:center;gap:12px;padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-logo{width:40px;height:40px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-text{color:#f1f5f9;font-size:15px;font-weight:700;line-height:1.3}
.brand-sub{color:#94a3b8;font-size:11px}
.menu{flex:1;padding:12px 8px}
.menu-group-title{color:#475569;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:12px 8px 6px}
.menu-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#94a3b8;font-size:14px;text-decoration:none;transition:all .15s;margin-bottom:2px}
.menu-item:hover{background:var(--sidebar-hover);color:#e2e8f0}
.menu-item.active{background:var(--primary);color:#fff;font-weight:600}
.menu-ico{font-size:16px;width:20px;text-align:center}
.sidebar-foot{padding:12px 8px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sidebar-foot a{display:block;text-align:center;padding:8px;border-radius:8px;color:#94a3b8;font-size:13px;text-decoration:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);transition:all .15s}
.sidebar-foot a:hover{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:10px}
.sys-name{font-size:16px;font-weight:700;color:var(--text-main)}
.tag-admin{background:var(--primary-bg);color:var(--primary);border:1px solid #bfdbfe;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.topbar-right{display:flex;align-items:center;gap:10px}
.admin-name{color:var(--text-sub);font-size:14px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:700;color:var(--text-main);margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-light))}
.stat-card:nth-child(2)::before{background:linear-gradient(90deg,#10b981,#34d399)}
.stat-card:nth-child(3)::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.stat-card:nth-child(4)::before{background:linear-gradient(90deg,#ef4444,#f87171)}
.stat-label{font-size:13px;color:var(--text-sub);margin-bottom:8px}
.stat-num{font-size:32px;font-weight:800;color:var(--text-main);line-height:1}
.layui-table{background:transparent!important}
.layui-table th{background:#f8fafc!important;color:var(--text-sub)!important;font-size:12px!important;font-weight:600!important;border-color:var(--border)!important}
.layui-table td{border-color:var(--border)!important;color:var(--text-main)!important;font-size:13px!important}
.layui-table tr:hover td{background:#f8fafc!important}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);color:#fff}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}.btn-warning:hover{background:#d97706;color:#fff}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626;color:#fff}
.btn-ghost{background:#fff;color:var(--text-sub);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--text-main)}
.btn-sm{padding:4px 10px;font-size:12px}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#d1fae5;color:#065f46}
.badge-orange{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gray{background:#f1f5f9;color:#475569}
@keyframes blink-red{0%,100%{opacity:1}50%{opacity:.6}}
.overdue-blink{animation:blink-red 1.2s ease-in-out infinite}
.toolbar{margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.muted{color:var(--text-light);font-size:13px}
.layui-form-label{color:var(--text-sub)!important;font-size:13px!important}
.layui-input,.layui-select,.layui-textarea{border-color:var(--border)!important;border-radius:8px!important;font-size:13px!important}
.layui-input:focus,.layui-textarea:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(37,99,235,.1)!important}
.layui-btn{border-radius:8px!important}
.layui-btn-normal{background:var(--primary)!important;border-color:var(--primary)!important}
.layui-btn-danger{background:var(--danger)!important;border-color:var(--danger)!important}
.layui-layer{border-radius:12px!important;border:1px solid var(--border)!important;box-shadow:0 20px 60px rgba(0,0,0,.15)!important}
.layui-layer-title{background:#f8fafc!important;color:var(--text-main)!important;font-weight:700!important;border-bottom:1px solid var(--border)!important;border-radius:12px 12px 0 0!important}
.layui-tab-brief>.layui-tab-title .layui-this{color:var(--primary)!important}
.layui-tab-brief>.layui-tab-title .layui-this:after{background:var(--primary)!important}
</style>
{block name="head"}{/block}
</head>
<body>
<div class="app-wrap">
<aside class="sidebar">
<div class="brand">
<div class="brand-logo">📚</div>
<div><div class="brand-text">智慧图书</div><div class="brand-sub">管理后台</div></div>
</div>
<nav class="menu">
<div class="menu-group-title">概览</div>
<a class="menu-item {:request()->controller() === 'Index' ? 'active' : ''}" href="/admin/index/index"><span class="menu-ico">📊</span><span>统计首页</span></a>
<div class="menu-group-title">业务管理</div>
<a class="menu-item {:request()->controller() === 'Book' ? 'active' : ''}" href="/admin/book/index"><span class="menu-ico">📖</span><span>图书管理</span></a>
<a class="menu-item {:request()->controller() === 'Reader' ? 'active' : ''}" href="/admin/reader/index"><span class="menu-ico">👤</span><span>读者管理</span></a>
<a class="menu-item {:request()->controller() === 'Borrow' ? 'active' : ''}" href="/admin/borrow/index"><span class="menu-ico">📝</span><span>借阅管理</span></a>
<a class="menu-item {:request()->controller() === 'BorrowApply' ? 'active' : ''}" href="/admin/borrowApply/index"><span class="menu-ico">📋</span><span>借阅申请</span></a>
<a class="menu-item {:request()->controller() === 'RenewApply' ? 'active' : ''}" href="/admin/renewApply/index"><span class="menu-ico">🔄</span><span>续借申请</span></a>
<a class="menu-item {:request()->controller() === 'Notice' ? 'active' : ''}" href="/admin/notice/index"><span class="menu-ico">📢</span><span>公告管理</span></a>
</nav>
<div class="sidebar-foot"><a href="/admin/login/logout">退出登录</a></div>
</aside>
<div class="main">
<header class="topbar">
<div class="topbar-left"><span class="sys-name">智慧图书管理系统</span><span class="tag-admin">管理员后台</span></div>
<div class="topbar-right"><span class="admin-name">{:session('admin_name') ?: '管理员'}</span><div class="avatar">{:mb_substr((string)(session('admin_name') ?: '管'), 0, 1, 'UTF-8')}</div></div>
</header>
<main class="content">{block name="content"}{/block}</main>
</div>
</div>
<script src="https://unpkg.com/layui@2.9.6/dist/layui.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{block name="script"}{/block}
</body>
</html>
